<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeMart - Payment</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/shared.js" defer></script>
    <script src="../js/payment.js" defer></script>
</head>
<body>

<section class="page active">

    <div class="payment-box glass">

        <h1>🔐 Secure Payment</h1>

        <h2>Amount to Pay: <span>₹<span id="paymentAmount"></span></span></h2>

        <div class="timer">
            ⏱️ Time Left: <span id="timer">10:00</span>
        </div>

        <div class="payment-methods">
            <button onclick="showMethod('cardSection')">💳 Card</button>
            <button onclick="showMethod('qrSection')">📱 QR Code</button>
        </div>

        <div id="cardSection" class="method-section">
            <input type="text" placeholder="Card Number (16 digits)" maxlength="16">
            <input type="text" placeholder="Card Holder Name">
            <input type="text" placeholder="MM/YY" maxlength="5">
            <input type="password" placeholder="CVV (3 digits)" maxlength="3">
        </div>

        <div id="qrSection" class="method-section hidden">
            <p style="text-align: center; margin-bottom: 15px; color: rgba(255,255,255,0.8);">Scan to pay securely</p>
            <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=LuxeMartPayment">
        </div>

        <button class="pay-btn" onclick="completePayment()">
            ✓ Complete Payment
        </button>

    </div>

</section>

</body>
</html>
