<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeMart - Gaming</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/shared.js" defer></script>
    <script src="../js/products-data.js" defer></script>
    <script src="../js/products.js" defer></script>
</head>
<body>

<section class="page active" data-category="Gaming">

    <header>
        <h1 id="categoryTitle"></h1>
        <button onclick="location.href='home.html'">⬅ Back</button>
    </header>

    <div class="filters-section glass">
        <h3>🔍 Filter & Sort</h3>
        <div class="filters-grid">
            <div class="filter-group">
                <label for="brandFilter">Brand:</label>
                <select id="brandFilter" onchange="currentFilters.brand = this.value; applyFilters();">
                    <option value="all">All Brands</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="ratingFilter">Rating:</label>
                <select id="ratingFilter" onchange="currentFilters.rating = this.value; applyFilters();">
                    <option value="all">All Ratings</option>
                    <option value="4.5">4.5+ Stars</option>
                    <option value="4.0">4.0+ Stars</option>
                    <option value="3.5">3.5+ Stars</option>
                    <option value="3.0">3.0+ Stars</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="priceRangeFilter">Price Range:</label>
                <select id="priceRangeFilter" onchange="currentFilters.priceRange = this.value; applyFilters();">
                    <option value="all">All Prices</option>
                    <option value="under-500">Under ₹500</option>
                    <option value="500-2000">₹500 - ₹2000</option>
                    <option value="2000-5000">₹2000 - ₹5000</option>
                    <option value="5000-10000">₹5000 - ₹10000</option>
                    <option value="above-10000">Above ₹10000</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="priceSort">Sort by Price:</label>
                <select id="priceSort" onchange="currentFilters.priceSort = this.value; applyFilters();">
                    <option value="none">Default</option>
                    <option value="low-to-high">Low to High</option>
                    <option value="high-to-low">High to Low</option>
                </select>
            </div>
            <div class="filter-group">
                <button onclick="resetFilters()" class="reset-btn">🔄 Reset Filters</button>
            </div>
        </div>
    </div>

    <div id="productsContainer" class="products-grid"></div>

</section>

</body>
</html>
