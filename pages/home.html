<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeMart - Home</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/shared.js" defer></script>
    <script src="../js/home.js" defer></script>
</head>
<body>

<section class="page active">

    <header>
        <h1>LuxeMart</h1>
        <div class="header-controls">
            <nav>
                <button onclick="location.href='about.html'">About</button>
                <button onclick="location.href='contact.html'">Contact</button>
                <button onclick="location.href='favourites.html'">Favourites ❤️</button>
                <button onclick="location.href='cart.html'">Cart 🛒</button>
                <button onclick="location.href='../index.html'">Logout</button>
            </nav>
        </div>
    </header>

    <h2 class="section-title">Premium Categories</h2>

    <div class="categories">
        <div class="category-card" onclick="openCategory('Gaming')">
            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
            <h3>Gaming</h3>
        </div>
        <div class="category-card" onclick="openCategory('Electronics')">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
            <h3>Electronics</h3>
        </div>
        <div class="category-card" onclick="openCategory('Fashion')">
            <img src="https://images.unsplash.com/photo-1445205170230-053b83016050">
            <h3>Fashion</h3>
        </div>
        <div class="category-card" onclick="openCategory('Sports')">
            <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
            <h3>Sports</h3>
        </div>
        <div class="category-card" onclick="openCategory('Home & Kitchen')">
            <img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136">
            <h3>Home & Kitchen</h3>
        </div>
        <div class="category-card" onclick="openCategory('Beauty & Personal Care')">
            <img src="https://images.unsplash.com/photo-1556228720-195a672e8a03">
            <h3>Beauty & Personal Care</h3>
        </div>
        <div class="category-card" onclick="openCategory('Books')">
            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f">
            <h3>Books</h3>
        </div>
        <div class="category-card" onclick="openCategory('All Products')">
            <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d">
            <h3>All Products</h3>
        </div>
    </div>

</section>

</body>
</html>
